version: '3.8'

services:
  app:
    image: ${DOCKER_USERNAME:-your-username}/qttech-owner-panel:${TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qttech-owner-panel
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8002}:80"
    env_file:
      - .env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: qttech-owner-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-goride_owner}
      MYSQL_USER: ${DB_USERNAME:-owner}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql-data:
  app-storage:

networks:
  app-network:
    driver: bridge
